name: Archy Version Check

on:
  schedule:
    - cron: "0 0 * * *" # once per day UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Get latest version
        id: latest
        run: |
          set -euo pipefail

          VERSION=$(curl -fsSL https://sdk-cdn.mypurecloud.com/archy/versions.json \
            | jq -r '.[].version' \
            | sort -V \
            | tail -n1)

          if [ -z "$VERSION" ]; then
            echo "Failed to determine latest version"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get current version
        id: current
        run: |
          set -euo pipefail

          VERSION=$(grep -E '^  version "' Casks/archy.rb | cut -d'"' -f2)

          if [ -z "$VERSION" ]; then
            echo "Failed to read current version"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compare versions
        id: compare
        run: |
          set -euo pipefail

          if [ "${{ steps.latest.outputs.version }}" != "${{ steps.current.outputs.version }}" ]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
          else
            echo "update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts and compute SHA256
        if: steps.compare.outputs.update == 'true'
        id: hash
        run: |
          set -euo pipefail

          VERSION="${{ steps.latest.outputs.version }}"
          BASE="https://sdk-cdn.mypurecloud.com/archy/${VERSION}"

          curl -fL "${BASE}/archy-macos.zip" -o archy-macos.zip
          curl -fL "${BASE}/archy-linux.zip" -o archy-linux.zip

          MACOS_SHA=$(shasum -a 256 archy-macos.zip | awk '{print $1}')
          LINUX_SHA=$(shasum -a 256 archy-linux.zip | awk '{print $1}')

          if [ -z "$MACOS_SHA" ] || [ -z "$LINUX_SHA" ]; then
            echo "Failed to compute SHA"
            exit 1
          fi

          echo "macos_sha=$MACOS_SHA" >> "$GITHUB_OUTPUT"
          echo "linux_sha=$LINUX_SHA" >> "$GITHUB_OUTPUT"

      - name: Update cask file
        if: steps.compare.outputs.update == 'true'
        run: |
          set -euo pipefail

          sed -i "s/^  version \".*\"/  version \"${{ steps.latest.outputs.version }}\"/" Casks/archy.rb
          sed -i "/on_macos do/,/^  end$/ s/^    sha256 \".*\"/    sha256 \"${{ steps.hash.outputs.macos_sha }}\"/" Casks/archy.rb
          sed -i "/on_linux do/,/^  end$/ s/^    sha256 \".*\"/    sha256 \"${{ steps.hash.outputs.linux_sha }}\"/" Casks/archy.rb

      - name: Commit and push
        if: steps.compare.outputs.update == 'true'
        run: |
          set -euo pipefail

          git config user.name "archy-version-check"
          git config user.email "no-reply@genesys.com"

          git add Casks/archy.rb

          if git diff --cached --quiet; then
            echo "No cask changes to commit."
            exit 0
          fi

          git commit -m "Update archy to ${{ steps.latest.outputs.version }}"
          git pull --rebase
          git push